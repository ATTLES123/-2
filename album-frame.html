<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievement Album</title>
    <link rel="stylesheet" href="./album-frame.css">
</head>
<body>
    <main class="album-scene" id="scene">
        <div class="album-scene__backdrop"></div>
        <div class="album-scene__glow"></div>
        <div class="album-scene__grain"></div>
        <div class="album-scene__vignette"></div>

        <section class="album-portal" id="portal" aria-live="polite">
            <div class="album-portal__ground-shadow"></div>

            <div class="album-closed-book" id="closedBook" aria-hidden="true">
                <div class="album-closed-book__drop"></div>
                <div class="album-closed-book__spine"></div>
                <div class="album-closed-book__cover"></div>
                <div class="album-closed-book__paper"></div>
                <div class="album-closed-book__strap"></div>
                <div class="album-closed-book__title">CHRONICLE</div>
                <div class="album-closed-book__subtitle">PRIVATE ARCHIVE</div>
                <div class="album-closed-book__gloss"></div>
            </div>

            <section class="album-rig" id="rig" aria-hidden="true">
                <div class="album-rig__floor-shadow"></div>
                <div class="album-rig__underlay"></div>
                <div class="album-rig__spine"></div>
                <div class="album-rig__stack album-rig__stack--left"></div>
                <div class="album-rig__stack album-rig__stack--right"></div>

                <section class="album-page" id="pageViewport">
                    <div class="album-page__surface" id="pageSurface">
                        <div class="album-page__sheet" id="pageSheet"></div>
                    </div>
                </section>

                <div class="album-turner" id="pageTurner" aria-hidden="true"></div>

                <section class="album-cover" id="cover">
                    <div class="album-cover__face album-cover__face--front">
                        <div class="album-cover__stitch"></div>
                        <div class="album-cover__foil"></div>
                        <div class="album-cover__title">CHRONICLE</div>
                        <div class="album-cover__subtitle">PRIVATE ARCHIVE</div>
                        <div class="album-cover__strap"></div>
                    </div>

                    <div class="album-cover__face album-cover__face--back">
                        <div class="album-cover__liner"></div>
                        <div class="cover-inside">
                            <div class="cover-inside__corner" id="closeCorner" aria-hidden="true"></div>
                            <div class="cover-inside__eyebrow">Private Archive</div>
                            <h1 class="cover-inside__title" id="insideTitle">Achievement Archive</h1>
                            <div class="cover-inside__summary">
                                <div class="cover-inside__summary-item">
                                    <span>Unlocked</span>
                                    <strong id="insideUnlockCount">0</strong>
                                </div>
                                <div class="cover-inside__summary-item">
                                    <span>Total</span>
                                    <strong id="insideTotalCount">0</strong>
                                </div>
                            </div>
                            <div class="chapter-rail" id="chapterRail"></div>
                        </div>
                    </div>
                </section>
            </section>
        </section>

        <aside class="unlock-toast" id="unlockToast" aria-live="polite">
            <div class="unlock-toast__eyebrow">Achievement Unlocked</div>
            <div class="unlock-toast__title" id="unlockToastTitle">A new memory has been recorded.</div>
            <div class="unlock-toast__id" id="unlockToastId">RE_001</div>
        </aside>
    </main>

    <script type="module" src="./album-frame.js"></script>
</body>
</html>
